<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cumpleaños 🎂</title>

  <!-- FAVICON 🎂 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎂</text></svg>">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fff3f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #d63384;
    }

    .cake {
      font-size: 100px;
      margin: 20px 0;
    }

    input {
      padding: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #ff69b4;
      color: white;
      margin-top: 10px;
      cursor: pointer;
    }

    .hidden {
      display: none;
      margin-top: 20px;
    }

    img {
      width: 90%;
      max-width: 300px;
      border-radius: 15px;
      margin-top: 10px;
    }

    .message {
      font-size: 22px;
      color: #333;
      margin-top: 15px;
    }

    /* CONFETI */
    #confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>🎉 Sorpresa 🎉</h1>

  <div class="cake">🕯️🕯️🎂🕯️🕯️</div>

  <p>Introduce tu código secreto:</p>
  <input type="text" id="codeInput" placeholder="dd/mm/yy">
  <br>
  <button onclick="checkCode(); toggleImagen();">Abrir sorpresa</button>
  <br><br>
  <img id="miImagen" src="imagen3.jpg">

  <!-- Sorpresa -->
  <div id="surprise" class="hidden">  
    <div class="message">
      <div style="text-align: center;">
        <h1>🎉 ¡¡Felicidades has sido invitada al Solraig Tibu-ron!! 🎉</h1>
        <p>Dia 30 de Abril a las 21:30h</p>
      </div>
    </div>
    <img src="foto.jpg">
  </div>

  <!-- Música -->
  <audio id="music" src="Parchís-Cumpleaños-feliz.mp3"></audio>

  <!-- Confeti -->
  <div id="confetti-container"></div>

  <script>
    function checkCode() {
      const code = document.getElementById("codeInput").value;
      const music = document.getElementById("music");

      if (code === "30/04/71") {
        document.getElementById("surprise").classList.remove("hidden");
        music.play();
        launchConfetti();
      } else {
        alert("💔 Código incorrecto 💔");
      }
    }

    function launchConfetti() {
      const container = document.getElementById("confetti-container");
      const colors = ["#ff69b4", "#ff85c1", "#ffc0cb", "#ffb6c1"];

      for (let i = 0; i < 80; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";

        container.appendChild(confetti);

        setTimeout(() => confetti.remove(), 3000);
      }
    }
  </script>

  <script>
function toggleImagen() {
  const img = document.getElementById("miImagen");

  if (img.style.display === "hidden") {
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }
}
</script>

</body>
</html>
